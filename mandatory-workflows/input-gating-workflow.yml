name: rogue-input-gating
description: Validates input with Rogue API before passing to agent
enabled: true

triggers:
  - type: manual

inputs:
  - name: user_input
    type: string
    description: "The user's input message to validate"
  - name: agent_id
    type: string
    description: "Target agent ID to execute if input is safe"
  - name: session_id
    type: string
    description: "Session identifier for tracking"

steps:
  - name: call_rogue
    type: http
    with:
      url: "https://api.rogue.security/api/v1/evaluation/evaluate"
      method: POST
      headers:
        X-Rogue-API-Key: "{{ secrets.rogue_api_key }}"
        Content-Type: "application/json"
      body: '{"messages":[{"role":"user","content":"{{ inputs.user_input }}"}],"prompt_injections":true,"content_moderation_check":true,"pii_check":false,"hallucinations_check":false,"policy_target":"input"}'

  - name: check_safety
    type: if
    condition: "steps.call_rogue.output.body.data.status: success"
    steps:
      - name: call_agent
        type: kibana.request
        with:
          method: POST
          path: /api/agent_builder/converse
          body:
            input: "{{ inputs.user_input }}"
            agent_id: "{{ inputs.agent_id }}"

      - name: return_response
        type: return
        with:
          status: "allowed"
          response: "{{ steps.call_agent.output.response.message }}"
          score: "{{ steps.call_rogue.output.body.data.score }}"

    else:
      - name: return_blocked
        type: return
        with:
          status: "blocked"
          response: "I cannot process this request due to safety policies."
          score: "{{ steps.call_rogue.output.body.data.score }}"
