name: rogue-output-validation
description: Validates agent response with Rogue API before delivering to user
enabled: true

triggers:
  - type: manual

inputs:
  - name: user_input
    type: string
    description: "The original user input"
  - name: agent_id
    type: string
    description: "Agent ID to execute"
  - name: session_id
    type: string
    description: "Session identifier for tracking"

steps:
  - name: call_agent
    type: kibana.request
    with:
      method: POST
      path: /api/agent_builder/converse
      body:
        input: "{{ inputs.user_input }}"
        agent_id: "{{ inputs.agent_id }}"

  - name: validate_output
    type: http
    with:
      url: "https://api.rogue.security/api/v1/evaluation/evaluate"
      method: POST
      headers:
        X-Rogue-API-Key: "{{ secrets.rogue_api_key }}"
        Content-Type: "application/json"
      body: '{"messages":[{"role":"user","content":"{{ inputs.user_input }}"},{"role":"assistant","content":"{{ steps.call_agent.output.response.message }}"}],"hallucinations_check":true,"content_moderation_check":true,"pii_check":true,"grounding_check":true}'

  - name: check_output
    type: if
    condition: "steps.validate_output.output.body.data.status: success"
    steps:
      - name: return_safe
        type: return
        with:
          status: "delivered"
          response: "{{ steps.call_agent.output.response.message }}"
          score: "{{ steps.validate_output.output.body.data.score }}"

    else:
      - name: return_blocked
        type: return
        with:
          status: "blocked"
          response: "I apologize, but I cannot provide that response. Please try rephrasing your question."
          score: "{{ steps.validate_output.output.body.data.score }}"
