name: rogue-customer-service-pipeline
description: Customer service validation with PII protection
enabled: true

triggers:
  - type: manual

inputs:
  - name: user_input
    type: string
    description: "The user's input message"
  - name: agent_id
    type: string
    description: "Agent ID to execute"
  - name: session_id
    type: string
    description: "Session identifier for tracking"

steps:
  - name: validate_input
    type: http
    with:
      url: "https://api.rogue.security/api/v1/evaluation/evaluate"
      method: POST
      headers:
        X-Rogue-API-Key: "{{ secrets.rogue_api_key }}"
        Content-Type: "application/json"
      body: '{"messages":[{"role":"user","content":"{{ inputs.user_input }}"}],"prompt_injections":true,"content_moderation_check":true,"policy_target":"input"}'

  - name: input_gate
    type: if
    condition: "steps.validate_input.output.body.data.status: success"
    steps:
      - name: call_agent
        type: kibana.request
        with:
          method: POST
          path: /api/agent_builder/converse
          body:
            input: "{{ inputs.user_input }}"
            agent_id: "{{ inputs.agent_id }}"

      - name: validate_output
        type: http
        with:
          url: "https://api.rogue.security/api/v1/evaluation/evaluate"
          method: POST
          headers:
            X-Rogue-API-Key: "{{ secrets.rogue_api_key }}"
            Content-Type: "application/json"
          body: '{"messages":[{"role":"user","content":"{{ inputs.user_input }}"},{"role":"assistant","content":"{{ steps.call_agent.output.response.message }}"}],"hallucinations_check":true,"content_moderation_check":true,"pii_check":true}'

      - name: output_gate
        type: if
        condition: "steps.validate_output.output.body.data.status: success"
        steps:
          - name: return_safe
            type: return
            with:
              status: "delivered"
              response: "{{ steps.call_agent.output.response.message }}"
              domain: "customer_service"
              input_score: "{{ steps.validate_input.output.body.data.score }}"
              output_score: "{{ steps.validate_output.output.body.data.score }}"

        else:
          - name: return_output_blocked
            type: return
            with:
              status: "blocked"
              response: "I apologize, but I need to protect your privacy. How else can I assist you?"
              domain: "customer_service"
              output_score: "{{ steps.validate_output.output.body.data.score }}"

    else:
      - name: return_input_blocked
        type: return
        with:
          status: "blocked"
          response: "I want to help you, but I cannot respond to that request. Could you please rephrase?"
          domain: "customer_service"
          input_score: "{{ steps.validate_input.output.body.data.score }}"
