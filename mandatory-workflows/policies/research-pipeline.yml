name: rogue-research-pipeline
description: Research validation with permissive thresholds for academic use
enabled: true

triggers:
  - type: manual

inputs:
  - name: user_input
    type: string
    description: "The user's input message"
  - name: agent_id
    type: string
    description: "Agent ID to execute"
  - name: session_id
    type: string
    description: "Session identifier for tracking"

steps:
  - name: validate_input
    type: http
    with:
      url: "https://api.rogue.security/api/v1/evaluation/evaluate"
      method: POST
      headers:
        X-Rogue-API-Key: "{{ secrets.rogue_api_key }}"
        Content-Type: "application/json"
      body: '{"messages":[{"role":"user","content":"{{ inputs.user_input }}"}],"prompt_injections":true,"content_moderation_check":true,"policy_target":"input"}'

  - name: input_gate
    type: if
    condition: "steps.validate_input.output.body.data.status: success"
    steps:
      - name: call_agent
        type: kibana.request
        with:
          method: POST
          path: /api/agent_builder/converse
          body:
            input: "{{ inputs.user_input }}"
            agent_id: "{{ inputs.agent_id }}"

      - name: validate_output
        type: http
        with:
          url: "https://api.rogue.security/api/v1/evaluation/evaluate"
          method: POST
          headers:
            X-Rogue-API-Key: "{{ secrets.rogue_api_key }}"
            Content-Type: "application/json"
          body: '{"messages":[{"role":"user","content":"{{ inputs.user_input }}"},{"role":"assistant","content":"{{ steps.call_agent.output.response.message }}"}],"content_moderation_check":true,"grounding_check":true}'

      - name: output_gate
        type: if
        condition: "steps.validate_output.output.body.data.status: success"
        steps:
          - name: return_safe
            type: return
            with:
              status: "delivered"
              response: "{{ steps.call_agent.output.response.message }}"
              domain: "research"
              input_score: "{{ steps.validate_input.output.body.data.score }}"
              output_score: "{{ steps.validate_output.output.body.data.score }}"

        else:
          - name: return_with_warning
            type: return
            with:
              status: "warning"
              response: "{{ steps.call_agent.output.response.message }}"
              warning: "This response may contain speculative information. Please verify against authoritative sources."
              domain: "research"
              output_score: "{{ steps.validate_output.output.body.data.score }}"

    else:
      - name: return_input_blocked
        type: return
        with:
          status: "blocked"
          response: "I cannot process this research query due to safety concerns. Please reformulate."
          domain: "research"
          input_score: "{{ steps.validate_input.output.body.data.score }}"
